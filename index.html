<!DOCTYPE html>
<html>
<head>
<title>ESP32 Live Dashboard</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body{
  font-family: Arial;
  text-align: center;
  background: #0f2027;
  color: white;
}
.card{
  background:#203a43;
  padding:30px;
  margin:20px;
  border-radius:20px;
  display:inline-block;
  width:220px;
}
.value{
  font-size:50px;
  margin-top:10px;
}
</style>
</head>

<body>

<h1>🌍 ESP32 Real-Time Monitor</h1>

<div class="card">
<h2>🌡 Temperature</h2>
<div id="temp" class="value">--</div>
</div>

<div class="card">
<h2>💧 Humidity</h2>
<div id="hum" class="value">--</div>
</div>

<script>

// 🔥你的Firebase地址
const firebaseConfig = {
  databaseURL: "https://esp32-dht22-afccc-default-rtdb.asia-southeast1.firebasedatabase.app/"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

// ✅实时监听温度
db.ref("sensor/temperature").on("value", (snap) => {
  document.getElementById("temp").innerHTML = snap.val() + " °C";
});

// ✅实时监听湿度
db.ref("sensor/humidity").on("value", (snap) => {
  document.getElementById("hum").innerHTML = snap.val() + " %";
});

</script>

</body>
</html>
